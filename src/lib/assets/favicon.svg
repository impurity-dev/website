<svg width="100%" height="100%" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neon glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal background -->
  <rect x="0" y="0" width="512" height="512" rx="64" fill="#050505"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="512" height="80" rx="64" fill="#0b0b0b"/>

  <!-- Window buttons -->
  <circle cx="60" cy="40" r="10" fill="#ff5f56"/>
  <circle cx="90" cy="40" r="10" fill="#ffbd2e"/>
  <circle cx="120" cy="40" r="10" fill="#27c93f"/>

  <!-- Prompt -->
  <text x="80" y="240" font-family="monospace" font-size="80" fill="#39ff14" filter="url(#glow)">
    &gt;_
  </text>

  <!-- TK text -->
  <text x="160" y="330" font-family="monospace" font-size="180" fill="#39ff14" filter="url(#glow)">
    TK
  </text>
</svg>